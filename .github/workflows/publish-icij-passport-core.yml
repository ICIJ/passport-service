name: Publish passport core

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

jobs:
  create-release:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    env:
      PYTHON_VERSION: 3.12
      ASTRAL_VERSION: 0.11.6
    steps:
      - uses: actions/checkout@v6
      - name: Create GH release
        run: gh release create "$tag" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}

  publish-icij-passport-core-to-pypi:
    env:
      PYTHON_VERSION: 3.12
      ASTRAL_VERSION: 0.11.6
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    environment:
      name: pypi
      url: https://pypi.org/p/icij-passport-core
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install Python 3.12
        run: uv python install 3.12
      - name: Build
        run: uv build
      - name: Publish
        run: uv publish

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false
